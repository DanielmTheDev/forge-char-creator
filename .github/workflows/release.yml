name: Build and Release Foundry Module

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Build Module Zip
        run: |
          mkdir -p dist
          zip -r dist/forge-char-creator.zip ./* \
            -x "dist/*" \
            -x ".git/*" \
            -x "node_modules/*" \
            -x ".DS_Store" \
            -x "scripts/tests/*" \
            -x "README.md" \
            -x "DEPLOYMENT.md" \
            -x "workflows/*" \
            -x ".gitignore" \
            -x ".github/*"

      - name: Update Latest Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Foundry VTT Module Update
          body: Auto-generated from git commit.
          files: dist/forge-char-creator.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
